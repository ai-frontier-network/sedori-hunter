<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Frontier Sedori OS - お宝自動検知</title>
    
    <!-- 👑 Google AdSense 自動広告（ビネット・アンカー広告制御用） -->
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2908004621823900" crossorigin="anonymous"></script>
    

    <style>
        :root {
            --bg-color: #fafaf9;
            --card-bg: #ffffff;
            --text-color: #1c1917;
            --text-muted: #78716c;
            --accent-color: #e11d48;
            --border-color: #e7e5e4;
            --star-color: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #0f172a;
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid var(--accent-color);
        }
        header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
        }
        header p {
            margin: 10px 0 0;
            font-size: 0.95rem;
            color: #cbd5e1;
        }
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .update-time {
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .filter-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .filter-btn.active, .filter-btn:hover {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card-img-wrapper {
            position: relative;
            background-color: #f5f5f4;
            height: 200px;
            text-align: center;
        }
        .card-img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            margin: 0 auto;
        }
        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--accent-color);
            color: white;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: 800;
            border-radius: 4px;
        }
        .card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .stars {
            color: var(--star-color);
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        .title {
            font-size: 0.95rem;
            font-weight: 700;
            margin: 0 0 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 3rem;
        }
        .metrics {
            margin-top: auto;
            border-top: 1px dashed var(--border-color);
            padding-top: 15px;
        }
        .metric-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }
        .metric-label {
            color: var(--text-muted);
        }
        .metric-val {
            font-weight: 700;
        }
        .profit {
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: 800;
        }
        .btn-link {
            display: block;
            background-color: #0f172a;
            color: white;
            text-align: center;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 700;
            margin-top: 15px;
            font-size: 0.9rem;
            transition: opacity 0.2s ease;
        }
        .btn-link:hover {
            opacity: 0.9;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
        footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            margin-top: 60px;
        }
        .adsense-container {
            grid-column: 1 / -1;
            text-align: center;
            margin: 20px 0;
            min-height: 100px;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>AI Frontier Sedori OS</h1>
        <p>生活防衛・自立支援のための、高利益期待お宝自動検知プラットフォーム</p>
    </header>
    
    <div class="container">
        <div class="update-time">最終更新: 2026年06月03日 03:13</div>
        
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterItems('all')">すべて表示</button>
            <button class="filter-btn" onclick="filterItems('フルラ 財布')">フルラ 財布</button>
            <button class="filter-btn" onclick="filterItems('フルラ バッグ')">フルラ バッグ</button>
            <button class="filter-btn" onclick="filterItems('オールドコーチ')">オールドコーチ</button>
            <button class="filter-btn" onclick="filterItems('ゲンテン カットワーク')">ゲンテン</button>
            <button class="filter-btn" onclick="filterItems('坂本これくしょん')">坂本これくしょん</button>
            <button class="filter-btn" onclick="filterItems('エルメス シューズ サンダル')">エルメス靴</button>
            <button class="filter-btn" onclick="filterItems('シャネル サンダル パンプス')">シャネル靴</button>
            <button class="filter-btn" onclick="filterItems('ルイヴィトン スニーカー サンダル')">ヴィトン靴</button>
            <button class="filter-btn" onclick="filterItems('リーガル ローファー ビジネス')">リーガル</button>
        </div>
        
        <div class="grid" id="item-grid">
            
                <div class="no-data">現在、基準を満たすお得な案件はありません。次回の巡回をお待ちください。</div>
            
        </div>
    </div>
    
    <footer>
        <p>© 2026 AI Frontier Sedori OS. Powered by cocoro-brand.</p>
    </footer>

    <script>
        function filterItems(keyword) {
            const cards = document.querySelectorAll('.card');
            const buttons = document.querySelectorAll('.filter-btn');
            
            // ボタンのアクティブ状態を切り替え
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            cards.forEach(card => {
                if (keyword === 'all' || card.getAttribute('data-keyword') === keyword) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
