name: AI Frontier Sedori OS Auto Run

on:
  # schedule:
    # - cron: '30 2,14 * * *'  # 1日2回自動で実行（日本時間 11:30、23:30）
  workflow_dispatch:        # 手動でいつでも実行できるボタンを設置

jobs:
  run-hunter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージのインストール
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: お宝検知エンジンの実行
        run: python main.py

      - name: 生成された index.html とデータを自動保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json || true
          git diff --staged --quiet || git commit -m "🤖 Auto: お宝リストを自動更新"
          git push
